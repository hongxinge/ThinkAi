# ThinkAi 配置文件示例
# 支持环境变量覆盖(THINKAI_前缀)

# 基础配置
app_name: "MyThinkAiApp"
debug: false
default_provider: "ollama"
default_model: "llama3"

# Provider配置
providers:
  ollama:
    api_base: "http://localhost:11434"
    timeout: 60
    max_retries: 3
  
  openai:
    api_key: "${OPENAI_API_KEY}"  # 从环境变量读取
    api_base: "https://api.openai.com/v1"
    timeout: 60
    max_retries: 3
  
  qwen:
    api_key: "${QWEN_API_KEY}"
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    timeout: 60
  
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    api_base: "https://api.deepseek.com/v1"
    timeout: 60

# 模型配置
models:
  llama3:
    provider: "ollama"
    model: "llama3"
    temperature: 0.7
    max_tokens: 2048
  
  gpt4:
    provider: "openai"
    model: "gpt-4"
    temperature: 0.7
    max_tokens: 4096
  
  qwen_turbo:
    provider: "qwen"
    model: "qwen-turbo"
    temperature: 0.7
    max_tokens: 2048
  
  deepseek_chat:
    provider: "deepseek"
    model: "deepseek-chat"
    temperature: 0.7
    max_tokens: 2048

# 会话配置
session:
  enabled: true
  max_history: 20
  storage: "memory"  # memory, redis
  ttl: 3600  # 1小时
  redis_url: "redis://localhost:6379"  # 当storage为redis时

# RAG配置
rag:
  enabled: false
  chunk_size: 500
  chunk_overlap: 50
  top_k: 5
  embedding_model: "nomic-embed-text"
  vector_store: "chroma"
  vector_store_path: "./thinkai_data/vectors"

# Agent配置
agent:
  enabled: false
  max_iterations: 10
  max_execution_time: 300
  verbose: false

# 日志配置
log_level: "INFO"
log_file: "./thinkai.log"
